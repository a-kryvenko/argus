services:
  api:
    build:
      context: ../../
      dockerfile: apps/api-public/Dockerfile
    expose:
      - "8000"
    volumes:
      - ../../.env:/workspace/.env:ro
      - ../../.env.local:/workspace/.env.local:ro
      - ../../configs:/workspace/configs:ro
      - ../../models:/workspace/models
      - ../../reports:/workspace/reports
    networks:
      application:
  
  frontend:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    command: ["node", "apps/web/server.js"]
    expose:
      - "3000"
    volumes:
      - ../../.env:/app/.env:ro
      - ../../.env.local:/app/.env.local:ro
    depends_on:
      - api
    networks:
      application:

  nginx:
    image: nginx:stable-alpine
    container_name: argusNginx
    restart: unless-stopped
    tty: true
    volumes:
      - ../../log/nginx:/var/www/log
      - ./nginx/default.conf:/etc/nginx/includes/default.conf
      - ./nginx/templates/http.conf.template:/etc/nginx/templates/website.conf.template
    environment:
      - APP_NAME=${APP_NAME}
    depends_on:
      - frontend
      - api
    networks:
      frontserver:
      application:
          aliases:
            - ${APP_NAME}

networks:
  frontserver:
    driver: bridge
  application:
    driver: bridge
