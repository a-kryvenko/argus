project:
  name: argus-sunwatch

paths:
  wind_forecast: data/forecast/solar-wind/live.csv
  forecast_history: data/history

models:
  wind: data/models/speed_lgbm.joblib
  wind_quantile: data/models/speed_quantile_models.joblib
  wind_quantile_calibration: data/models/lead_hour_interval_calibration.csv
  events: data/models/speed_event_models.joblib

metrics:
  solar_wind_speed: data/metrics/wind_speed_by_lead.csv
  solar_wind_probability: data/metrics/wind_threshold_by_lead.csv

runtime:
  python: python
  api_module: api_public.main:app
  api_port: 8000
  api_host: 127.0.0.1
  api_pythonpath:
    - apps/api/src

sources:
  omni:
    enabled: true
    start: 20260313 #YYYYMMDD
    end: 20260313
    out: data/raw/omni/omni_2024.parquet
  dscovr:
    enabled: true
    range: 7d
    out: data/raw/dscovr/dscovr_7d.parquet
  sdo:
    enabled: true
    email: ${SDO_EMAIL}
    timestamps_csv: data/processed/forecast_timeseries.csv
    out_dir: data/raw/sdo
    manifest_out: data/raw/sdo/manifest.parquet

outputs:
  merged_csv: data/processed/forecast_timeseries.csv
  forecast_dataset_npz: data/processed/forecast_dataset.npz
  smoke_payload_json: data/processed/forecast_smoke_payload.json
