[project]
name = "core"
version = "0.1.0"
description = "Shared core modules for Argus SunWatch"
requires-python = ">=3.10"
dependencies = [
    "torch",
    "torchvision",
    "torchaudio",
    "pydantic-settings",
    "apscheduler",
    "pyjwt[crypto]>=2.12.1",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["core*"]

[tool.uv]
package = true