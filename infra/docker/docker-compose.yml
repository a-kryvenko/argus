services:
  api:
    build: ./apps/api
    ports: ["8000:8000"]
    volumes: ["./apps/api:/app"]
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  web:
    build: ./apps/web
    ports: ["3000:3000"]
    depends_on: [api]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: solar_forecast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres